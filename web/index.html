<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hermes Mission Control</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23FF3E00'/%3E%3Ctext x='16' y='23' font-family='monospace' font-size='17' font-weight='bold' fill='%23000' text-anchor='middle'%3E%23_%3C/text%3E%3C/svg%3E" />
<script>try{if(localStorage.theme==='dark')document.documentElement.classList.add('dark')}catch(e){}</script>
<link rel="stylesheet" href="/styles.css" />
</head>
<body>
<div class="scanlines"></div>
<div class="crt-glow"></div>
<div class="app">
  <aside class="sidebar">
    <div class="logo">
      <span class="logo-txt"><span class="logo-prompt">#_</span>ADMIN.SYS</span>
    </div>
    <nav id="tabs">
      <button class="tabbtn active" data-tab="overview"><span class="ic"></span>Overview</button>
      <button class="tabbtn" data-tab="agents"><span class="ic"></span>Agents</button>
      <button class="tabbtn" data-tab="temp"><span class="ic"></span>Temp</button>
      <button class="tabbtn" data-tab="profiles"><span class="ic"></span>Profiles</button>
      <button class="tabbtn" data-tab="schedule"><span class="ic"></span>Cron</button>
      <button class="tabbtn" data-tab="tasks"><span class="ic"></span>Tasks</button>
      <button class="tabbtn" data-tab="sessions"><span class="ic"></span>Sessions</button>
      <button class="tabbtn" data-tab="logs"><span class="ic"></span>Logs</button>
    </nav>
  </aside>

  <div class="content">
    <header>
      <div class="hstatus-col">
        <div class="hstatus"><span class="dot" id="livedot"></span> live feed · updated <span id="live-ago">just now</span></div>
        <div class="hbadges">
          <span class="pill mono" id="agentcount">0 agents</span>
          <span class="pill mono" id="profilecount">0 profiles</span>
          <span class="pill mono">v<span id="appver">—</span></span>
        </div>
      </div>
      <div class="spacer"></div>
      <span class="mono hlabel">filters</span>
      <div class="hfilters">
        <button id="f-active" class="filterbtn mono">running</button>
        <button id="f-stopped" class="filterbtn mono">stopped</button>
        <button id="f-clear" class="filterbtn mono">clear</button>
      </div>
      <span class="hsep">|</span>
      <span class="mono hlabel">agents</span>
      <div id="agentdd" class="agentdd">
        <button id="agentdd-btn" class="ddbtn mono" type="button">all ▾</button>
        <div id="agentdd-panel" class="ddpanel" hidden></div>
      </div>
      <span class="hsep">|</span>
      <button id="theme-toggle" class="filterbtn mono" type="button" title="toggle light / dark theme">dark</button>
    </header>

<main>
  <section class="tab active" id="tab-overview">
    <div class="skel-grid"><div class="skel"></div><div class="skel"></div><div class="skel"></div><div class="skel"></div></div>
  </section>
  <section class="tab" id="tab-temp"></section>
  <section class="tab" id="tab-agents"></section>
  <section class="tab" id="tab-profiles"></section>
  <section class="tab" id="tab-tasks"></section>
  <section class="tab" id="tab-schedule"></section>
  <section class="tab" id="tab-sessions"></section>
  <section class="tab" id="tab-logs"></section>
</main>
  </div>
</div>

<button id="to-top" class="to-top mono" type="button" title="jump to top" aria-label="jump to top">↑ top</button>

<script type="module" src="/js/main.js"></script>
</body>
</html>
