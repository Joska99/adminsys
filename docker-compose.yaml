services:
  adminsys:
    build: .
    image: adminsys
    container_name: adminsys
    restart: unless-stopped
    ports:
      # localhost-only on the host; container listens on 1999
      - "127.0.0.1:1999:1999"
    environment:
      DATA_ROOT: /data
      PORT: "1999"
      SSE_INTERVAL: "5"
      APP_VERSION: "1.0.0"
    volumes:
      # Mount each agent home read-only, one by one, as agents are onboarded.
      # The folder name under /data becomes the agent name in the dashboard.
      - ${AGNET1}:/data/hermes-cc:ro
      - ${AGNET2}:/data/hermes-ca:ro
      - ${AGNET3}:/data/hermes-cg:ro
      - ${AGNET4}:/data/hermes-news:ro
    deploy:
      resources:
        limits: { memory: 254Mb, cpus: "1.0" }
